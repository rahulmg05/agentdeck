name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build package
        run: uv build

      - name: Verify courier is bundled in the wheel
        run: |
          python3 -c "
          import zipfile, glob, sys
          wheel = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          assert 'blackbox/courier/emit.py' in names, 'courier/emit.py missing from wheel!'
          print('OK:', wheel)
          "
